<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* 🌈 Sky gradient background */
            background: linear-gradient(to top, #4facfe, #00f2fe);
        }

        /* 🧊 Glass Card */
        .card {
            width: 260px;
            padding: 25px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            color: white;
        }

        /* ☀️ Weather Icon */
        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* 🌡️ Temperature */
        .temp {
            font-size: 40px;
            font-weight: bold;
        }

        /* 📍 City */
        .city {
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* 🔽 Details Row */
        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
        }

        input {
            margin-top: 15px;
            padding: 8px;
            width: 90%;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">☀️</div>
    <div class="temp">--°C</div>
    <div class="city">Search City</div>

    <form method="POST">
        <input type="text" name="api_key" placeholder="OpenWeatherMap API key" value="{{ api_key }}">
        <input type="text" name="city" placeholder="Enter city" value="{{ city }}">
        <button type="submit">Search</button>
    </form>

    {% if weather %}
        <div class="icon">☁️</div>
        <div class="temp">{{ weather.temp }}°C</div>
        <div class="city">{{ weather.city }}</div>

        <div class="details">
            <div>💧 {{ weather.humidity }}%</div>
            <div>🌬 {{ weather.wind }} m/s</div>
        </div>
    {% endif %}

    {% if error %}
        <div style="margin-top: 15px; color: #ffdddd; font-size: 14px;">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
