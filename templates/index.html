<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(to top, #4facfe, #00f2fe);
        }

        .card {
            width: 260px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            color: white;
        }

        input {
            margin-top: 10px;
            padding: 8px;
            width: 90%;
            border-radius: 10px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border-radius: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="card">

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city">
        <button type="submit">Search</button>
    </form>

    {% if error %}
        <p style="color: yellow;">{{ error }}</p>
    {% endif %}

    {% if weather %}
        <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png">
        <h2>{{ weather.city }}</h2>
        <h1>{{ weather.temp }}°C</h1>
        <p>💧 {{ weather.humidity }}%</p>
        <p>🌬 {{ weather.wind }} m/s</p>
    {% endif %}

</div>
</body>
</html>
